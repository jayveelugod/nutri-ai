<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Forgot Password</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
</head>

<body class="bg-light">

    <div class="app-container px-4 py-5"
        style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

        <div class="text-center mb-4" id="headerText">
            <h2 class="fw-bold text-success">Reset Password</h2>
            <p class="text-muted">Enter your account email and new password.</p>
        </div>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4">

            <div id="forgotAlert" class="alert d-none py-2 small"></div>

            <form id="forgotForm">
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-muted">New Password</label>
                    <div class="input-group">
                        <input type="password" id="forgotNewPassword" class="form-control" required minlength="8">
                        <button class="btn btn-outline-secondary toggle-password d-flex align-items-center" type="button" style="border-color: #ced4da;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.173 8"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Confirm New Password</label>
                    <div class="input-group">
                        <input type="password" id="forgotConfirmPassword" class="form-control" required minlength="8">
                        <button class="btn btn-outline-secondary toggle-password d-flex align-items-center" type="button" style="border-color: #ced4da;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.173 8"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="resetBtn" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow-sm">
                    Reset Password
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="text-muted text-decoration-none small">Back to Login</a>
            </div>
        </div>

    </div>

    <!-- Add Bootstrap & jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/app.js"></script>

    <script>
        $('#forgotForm').submit(async function (e) {
            e.preventDefault();
            const email = $('#forgotEmail').val();
            const newPw = $('#forgotNewPassword').val();
            const confirmPw = $('#forgotConfirmPassword').val();
            const btn = $('#resetBtn');

            if (newPw !== confirmPw) {
                showToast("Passwords do not match!", 'danger');
                return;
            }

            if (!isStrongPassword(newPw)) {
                showToast("Please use a strong password that meets all requirements.", 'danger');
                return;
            }

            btn.prop('disabled', true).text('Resetting...');

            try {
                const res = await fetch(`${API_BASE_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        new_password: newPw
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || "Failed to reset password");
                }

                // Success
                $('#headerText').hide();
                $('#forgotForm').hide();

                const alertHtml = `
                    <div class="alert alert-success fw-bold text-center py-4 fs-5 mb-0 rounded-4">
                        Password reset successfully! You can now log in.
                    </div>
                `;
                $('.summary-card').append(alertHtml);

            } catch (err) {
                showToast(err.message, 'danger');
            } finally {
                btn.prop('disabled', false).text('Reset Password');
            }
        });
    </script>
</body>

</html>
