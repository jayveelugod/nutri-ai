<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Smart Onboarding</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="app-container px-4 py-5"
        style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

        <div class="text-center mb-5">
            <h1 class="fw-bold text-success">NutriAI ✨</h1>
            <p class="text-muted">Tell us about yourself to personalize your experience.</p>
        </div>

        <div class="card summary-card border-0 shadow-sm p-4 text-start">
            <form id="onboardingForm">
                <h5 class="fw-bold mb-3">Body Goals</h5>
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label small text-muted">Height (cm)</label>
                        <input type="number" class="form-control" id="height_cm" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted">Weight (kg)</label>
                        <input type="number" class="form-control" id="weight_kg" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label small text-muted">Target Weight (kg)</label>
                        <input type="number" class="form-control" id="target_weight_kg" required>
                        <small class="text-success d-block mt-1">We'll calculate your BMI and Daily Calories.</small>
                    </div>
                </div>

                <hr class="text-muted mb-4">

                <h5 class="fw-bold mb-3">Medical Profile Builder</h5>
                <div class="mb-3">
                    <label class="form-label small text-muted">Illnesses / Conditions (Optional)</label>
                    <input type="text" class="form-control" id="illnesses" placeholder="e.g. Diabetes, Hypertension">
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted">Food Allergies (Optional)</label>
                    <input type="text" class="form-control" id="allergies" placeholder="e.g. Peanuts, Shellfish">
                    <small class="text-muted d-block mt-1">Our AI will warn you if a scanned food is unsafe.</small>
                </div>

                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold pt-3 pb-3 shadow-sm"
                    id="saveProfileBtn">
                    Save Profile & Continue
                </button>
            </form>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
