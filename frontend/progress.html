<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Progress</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light pb-5 pt-4">

    <div class="app-container px-3">
        <!-- Header -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0">Progress</h4>
                <p class="text-muted small mb-0">Track your weight and nutrition over time.</p>
            </div>
        </header>

        <!-- Chart Card -->
        <div class="card summary-card border-0 shadow-sm p-3 mb-4 rounded-4">
            <h6 class="fw-bold mb-3 text-muted">Weight History (kg)</h6>
            <div style="height: 250px;">
                <canvas id="weightChart"></canvas>
            </div>
        </div>

        <!-- Add Weight -->
        <div class="card summary-card border-0 shadow-sm p-4 rounded-4 mb-4">
            <h6 class="fw-bold mb-3">Log Today's Weight</h6>
            <form id="weightLogForm" class="d-flex align-items-center gap-2">
                <input type="number" step="0.1" class="form-control" id="newWeightInput" placeholder="e.g. 70.5"
                    required>
                <button type="submit" class="btn btn-success fw-bold px-4 rounded-pill">Save</button>
            </form>
        </div>

        <!-- Food Log History by Date -->
        <h6 class="fw-bold mb-3 text-muted">Daily Nutrition History</h6>
        <div id="foodLogHistory">
            <!-- Daily summary cards will be injected here by ../scripts/app.js -->
            <div class="text-center text-muted py-4">
                <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                <p class="small mt-2 mb-0">Loading food logs...</p>
            </div>
        </div>
    </div>

    <!-- Unified Footer Container -->
    <div id="footerContainer"></div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- App Logic -->
    <script src="../scripts/app.js"></script>
</body>

</html>
