<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Register</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-light">

    <div class="app-container px-4 py-5"
        style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">Join NutriAI ✨</h2>
            <p class="text-muted">Start tracking your health today.</p>
        </div>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4">

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label small text-muted">Full Name</label>
                    <input type="text" class="form-control py-2" id="regName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" class="form-control py-2" id="regEmail" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted">Password</label>
                    <input type="password" class="form-control py-2" id="regPassword" required minlength="6">
                </div>

                <div id="regError" class="alert alert-danger d-none small py-2" role="alert"></div>

                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow-sm" id="regBtn">
                    Create Account
                </button>
            </form>

            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1">
                <span class="mx-3 text-muted small">OR</span>
                <hr class="flex-grow-1">
            </div>

            <div id="googleSignUpBtn" class="d-flex justify-content-center"></div>

            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account?</span>
                <a href="login.html" class="text-success text-decoration-none fw-bold small ms-1">Login</a>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/app.js"></script>
</body>

</html>
