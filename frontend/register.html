<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Register</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="bg-light">

    <div class="app-container px-4 py-5"
        style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">Join NutriAI ✨</h2>
            <p class="text-muted">Start tracking your health today.</p>
        </div>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4">

            <form id="registerForm">
                <div class="row g-2 mb-3">
                    <div class="col-5">
                        <label class="form-label small text-muted">First Name</label>
                        <input type="text" class="form-control py-2" id="regFirstName" required>
                    </div>
                    <div class="col-2">
                        <label class="form-label small text-muted">M.I.</label>
                        <input type="text" class="form-control py-2" id="regMiddleInitial" maxlength="1">
                    </div>
                    <div class="col-5">
                        <label class="form-label small text-muted">Last Name</label>
                        <input type="text" class="form-control py-2" id="regLastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" class="form-control py-2" id="regEmail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control py-2" id="regPassword" required minlength="8">
                        <button class="btn btn-outline-secondary toggle-password d-flex align-items-center" type="button" style="border-color: #ced4da;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                <path d="M16 8s-3-5.5-8-5.5S0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.173 8"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="regError" class="alert alert-danger d-none small py-2" role="alert"></div>

                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow-sm" id="regBtn">
                    Create Account
                </button>
            </form>

            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1">
                <span class="mx-3 text-muted small">OR</span>
                <hr class="flex-grow-1">
            </div>

            <div id="googleSignUpBtn" class="d-flex justify-content-center"></div>

            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account?</span>
                <a href="login.html" class="text-success text-decoration-none fw-bold small ms-1">Login</a>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/app.js"></script>
</body>

</html>
