<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Basic Info</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light pb-5 pt-4">

    <div class="app-container px-3">
        <!-- Header -->
        <header class="d-flex align-items-center mb-4 pt-2">
            <a href="profile.html" class="settings-back-btn btn btn-light rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width: 40px; height: 40px; border: 1px solid #dee2e6;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-secondary">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div>
                <h4 class="fw-bold mb-0">Basic Info</h4>
                <p class="text-muted small mb-0">Update your name and email address.</p>
            </div>
        </header>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4 mb-4">
            <h5 class="fw-bold mb-3 text-success">Basic Info & Goals</h5>

            <form id="profileInfoForm" class="mb-0">
                <div class="row g-2 mb-3">
                    <div class="col-5">
                        <label class="form-label small text-muted">First Name</label>
                        <input type="text" class="form-control" id="profileFirstName" required>
                    </div>
                    <div class="col-2">
                        <label class="form-label small text-muted">M.I.</label>
                        <input type="text" class="form-control" id="profileMiddleInitial" maxlength="1">
                    </div>
                    <div class="col-5">
                        <label class="form-label small text-muted">Last Name</label>
                        <input type="text" class="form-control" id="profileLastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" class="form-control" id="profileEmail" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold"
                    id="saveBasicInfoBtn">Save Basic Info</button>
            </form>
        </div>

        <!-- Unified Footer Container -->
        <div id="footerContainer"></div>
    </div>

    <!-- jQuery & Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- App Logic -->
    <script src="../scripts/app.js"></script>
</body>

</html>
