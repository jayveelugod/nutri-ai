<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Profile</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light pb-5 pt-4">

    <div class="app-container px-3">
        <!-- Header -->
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold mb-0">My Profile</h4>
                <p class="text-muted small mb-0">Update your body and medical goals.</p>
            </div>
        </header>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4 mb-4">
            <h5 class="fw-bold mb-3 text-success">Basic Info & Goals</h5>

            <form id="profileInfoForm" class="mb-4">
                <div class="mb-3">
                    <label class="form-label small text-muted">Full Name</label>
                    <input type="text" class="form-control" id="profileName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" class="form-control" id="profileEmail" required>
                </div>
                <button type="submit" class="btn btn-outline-success w-100 py-2 rounded-pill fw-bold"
                    id="saveBasicInfoBtn">Save Basic Info</button>
            </form>

            <hr class="mb-4">

            <h5 class="fw-bold mb-3 text-success">Body Metrics</h5>
            <form id="onboardingForm">
                <input type="hidden" id="isUpdate" value="true">

                <div class="mb-3 row">
                    <div class="col-6">
                        <label class="form-label small text-muted">Height (cm)</label>
                        <input type="number" step="0.1" class="form-control" id="height_cm" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted">Current Weight (kg)</label>
                        <input type="number" step="0.1" class="form-control" id="weight_kg" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Target Weight (kg)</label>
                    <input type="number" step="0.1" class="form-control" id="target_weight_kg" required>
                </div>

                <h5 class="fw-bold mb-3 text-danger">Medical Profile <span
                        class="badge bg-danger rounded-pill fw-normal" style="font-size: 0.6rem;">Caution System</span>
                </h5>
                <p class="small text-muted mb-3">NutriAI uses this info to warn you about dangerous scanned foods.</p>

                <div class="mb-3">
                    <label class="form-label small text-muted">Pre-existing Illnesses (comma separated)</label>
                    <input type="text" class="form-control" id="illnesses" placeholder="e.g. Diabetes, Hypertension">
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Allergies (comma separated)</label>
                    <input type="text" class="form-control" id="allergies" placeholder="e.g. Peanuts, Shellfish">
                </div>

                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold" id="saveProfileBtn">Update
                    Goals</button>
            </form>
        </div>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4 mb-5">
            <h5 class="fw-bold mb-3 text-warning">Security</h5>
            <div id="passwordAlert" class="alert d-none py-2 small"></div>
            <form id="changePasswordForm">
                <div class="mb-3">
                    <label class="form-label small text-muted">Current Password</label>
                    <input type="password" class="form-control" id="currentPassword" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">New Password</label>
                    <input type="password" class="form-control" id="newPassword" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirmNewPassword" required>
                </div>
                <button type="submit" class="btn btn-outline-warning w-100 py-2 rounded-pill fw-bold"
                    id="changePasswordBtn">Change Password</button>
            </form>
        </div>
    </div>

    <!-- Unified Footer Container -->
    <div id="footerContainer"></div>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>

</html>
