<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Food AI Scanner</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="app-container bg-dark px-3 pt-4 pb-5 mb-5" style="min-height: 100vh;">

        <!-- Top Nav -->
        <nav class="d-flex justify-content-between align-items-center mb-4">
            <a href="index.html" class="text-white text-decoration-none p-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-x">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </a>
            <h5 class="m-0 fw-bold">AI Food Scanner</h5>
            <div style="width: 24px;"></div>
        </nav>

        <!-- Live Camera Viewport using WebRTC -->
        <div class="scanner-viewport position-relative rounded-4 overflow-hidden mb-4"
            style="height: 400px; background-color: #000; display:flex; align-items:center; justify-content:center;">
            <video id="cameraStream" autoplay playsinline muted
                style="width: 100%; height: 100%; object-fit: cover;"></video>
            <canvas id="cameraCanvas" style="display:none;"></canvas>

            <img id="imagePreview" src="" alt="Preview"
                style="display:none; width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 5;" />

            <!-- Camera overlay frame -->
            <div id="cameraFrame" class="position-absolute w-100 h-100 p-4"
                style="border: 2px dashed rgba(255,255,255,0.4); z-index: 10; pointer-events: none;">
            </div>

            <!-- Fallback Input Overlay for HTTP Mobile -->
            <div id="cameraFallbackOverlay"
                class="position-absolute w-100 h-100 d-none flex-column align-items-center justify-content-center"
                style="z-index: 12; background-color: rgba(0,0,0,0.8);">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-camera text-white mb-3">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <label for="fallbackCameraInput" class="btn btn-outline-light rounded-pill px-4 fw-bold">Tap to Take
                    Photo</label>
                <input type="file" id="fallbackCameraInput" accept="image/*" capture="environment" class="d-none">
            </div>

            <button type="button" id="captureBtn" class="btn btn-light rounded-circle position-absolute"
                style="width: 60px; height: 60px; bottom: 20px; z-index: 15; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            </button>

            <button type="button" id="retakeBtn" class="btn btn-dark btn-sm rounded-pill position-absolute d-none"
                style="top: 20px; right: 20px; z-index: 20;">
                Retake
            </button>
        </div>

        <!-- Controls -->
        <div class="card bg-dark border-secondary p-3 mb-4 rounded-4">
            <form id="aiScanForm">
                <div class="mb-3 d-flex justify-content-between" id="uploadInputContainer">
                    <div>
                        <label class="form-label small text-light opacity-75">Provide Details Manually</label>
                        <input class="form-control form-control-sm bg-dark text-white border-secondary" type="file"
                            id="foodImage" accept="image/*">
                    </div>
                </div>

                <div class="mb-3" id="textInputContainer">
                    <label class="form-label small text-light opacity-75">Or type / speak what you ate</label>
                    <div class="input-group">
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="foodText"
                            placeholder="e.g. 2 slices of pepperoni pizza">
                        <button type="button"
                            class="btn btn-outline-light d-flex align-items-center justify-content-center"
                            id="voiceInputBtn" title="Voice Input">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="feather feather-mic">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <small id="voiceStatus" class="text-white-50 d-none mt-1">🔴 Listening...</small>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-light opacity-75">Meal Time</label>
                    <select class="form-select bg-dark text-white border-secondary" id="mealType">
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner" selected>Dinner</option>
                        <option value="Snack">Snack</option>
                    </select>
                </div>

                <!-- Barcode Scanner Result Area (Hidden initially) -->
                <div id="barcodeResult"
                    class="d-none mb-3 p-2 rounded bg-dark border border-info text-info small text-center fw-bold">
                </div>

                <button type="submit" class="btn btn-success w-100 rounded-pill py-3 fw-bold shadow-sm" id="analyzeBtn">
                    Analyze Food & Log
                </button>
            </form>
        </div>

        <!-- Loading State -->
        <div id="scanLoading" class="text-center py-5 d-none">
            <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
            <h5 class="text-light fw-bold">Gemini AI is analyzing...</h5>
            <p class="text-white-50">Extracting macronutrients and checking medical cautions according to your profile.
            </p>
        </div>

        <!-- AI Result Presentation -->
        <div id="scanResult" class="d-none card bg-white text-dark border-0 p-4 rounded-4 summary-card">
            <div id="medicalCautionAlert" class="alert alert-danger d-none fw-bold" role="alert">
                ⚠️ Medical Caution: <span id="cautionText"></span>
            </div>

            <h4 class="fw-bold mb-3" id="resFoodName">Detected Food Name</h4>
            <div class="row text-center mb-3">
                <div class="col-6 mb-2">
                    <span class="d-block small text-muted">Calories</span>
                    <span class="fs-4 fw-bold text-success" id="resCals">0</span>
                </div>
                <div class="col-6 mb-2">
                    <span class="d-block small text-muted">Protein (g)</span>
                    <span class="fs-4 fw-bold" id="resProtein">0</span>
                </div>
                <div class="col-6 mb-2">
                    <span class="d-block small text-muted">Carbs (g)</span>
                    <span class="fs-4 fw-bold" id="resCarbs">0</span>
                </div>
                <div class="col-6 mb-2">
                    <span class="d-block small text-muted">Fat (g)</span>
                    <span class="fs-4 fw-bold" id="resFat">0</span>
                </div>
            </div>

            <hr>
            <h6 class="fw-bold text-muted small mb-2">MICRONUTRIENTS</h6>
            <div class="row text-center">
                <div class="col-4">
                    <span class="d-block small text-muted">Vit C</span>
                    <span class="fw-bold text-info" id="resVitC">0</span><small> mg</small>
                </div>
                <div class="col-4">
                    <span class="d-block small text-muted">Calcium</span>
                    <span class="fw-bold text-info" id="resCalcium">0</span><small> mg</small>
                </div>
                <div class="col-4">
                    <span class="d-block small text-muted">Iron</span>
                    <span class="fw-bold text-info" id="resIron">0</span><small> mg</small>
                </div>
            </div>

            <button class="btn btn-outline-success w-100 rounded-pill mt-4 fw-bold"
                onclick="window.location.href='index.html'">Back to Dashboard</button>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- QuaggaJS for barcode scanning -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="../scripts/app.js"></script>
</body>

</html>
