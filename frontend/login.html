<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Login</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="app-container px-4"
        style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">

        <div class="text-center mb-5">
            <h1 class="fw-bold text-success display-4">NutriAI ✨</h1>
            <p class="text-muted">Your personal wellness companion.</p>
        </div>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4">
            <h4 class="fw-bold mb-4">Welcome Back</h4>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" class="form-control py-2" id="loginEmail" required>
                </div>
                <div class="mb-1">
                    <label class="form-label small text-muted">Password</label>
                    <input type="password" class="form-control py-2" id="loginPassword" required>
                </div>
                <div class="text-end mb-4">
                    <a href="forgot-password.html" class="text-success text-decoration-none small fw-bold">Forgot
                        Password?</a>
                </div>

                <div id="loginError" class="alert alert-danger d-none small py-2" role="alert"></div>

                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow-sm" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted small">Don't have an account?</span>
                <a href="register.html" class="text-success text-decoration-none fw-bold small ms-1">Sign Up</a>
            </div>
        </div>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
