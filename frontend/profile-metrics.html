<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriAI - Body Metrics</title>
    <!-- App Icons -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-light pb-5 pt-4">

    <div class="app-container px-3">
        <!-- Header -->
        <header class="d-flex align-items-center mb-4 pt-2">
            <a href="profile.html" class="settings-back-btn btn btn-light rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width: 40px; height: 40px; border: 1px solid #dee2e6;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-secondary">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </a>
            <div>
                <h4 class="fw-bold mb-0">Body Metrics</h4>
                <p class="text-muted small mb-0">Update your metrics and health conditions.</p>
            </div>
        </header>

        <div class="card summary-card border-0 shadow-sm p-4 text-start rounded-4 mb-4">
            <h5 class="fw-bold mb-3 text-success">Body Metrics</h5>
            <form id="onboardingForm" class="mb-0">
                <input type="hidden" id="isUpdate" value="true">

                <div class="mb-3 row">
                    <div class="col-6">
                        <label class="form-label small text-muted">Height (cm)</label>
                        <input type="number" step="0.1" class="form-control" id="height_cm" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small text-muted">Current Weight (kg)</label>
                        <input type="number" step="0.1" class="form-control" id="weight_kg" required>
                    </div>
                </div>

                <!-- BMI Display Visualizer -->
                <div id="bmiDisplayContainer" class="d-none mb-4 p-3 rounded-3 bg-light border border-light-subtle bmi-container">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <div>
                            <span class="small text-muted d-block" style="font-size: 0.75rem;">Calculated BMI</span>
                            <span class="fs-4 fw-bold text-success" id="bmiValue">-</span>
                        </div>
                        <div class="text-end">
                            <span class="small text-muted d-block" style="font-size: 0.75rem;">Health Status</span>
                            <span class="badge fs-6 px-3 py-2 rounded-pill" id="bmiCategoryBadge">-</span>
                        </div>
                    </div>
                    <div class="progress mt-2 shadow-sm" style="height: 8px;" id="bmiProgressBarContainer">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%" id="bmiProgressBar"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Target Weight (kg)</label>
                    <input type="number" step="0.1" class="form-control" id="target_weight_kg" required>
                </div>

                <h5 class="fw-bold mb-3 text-danger">Medical Profile <span
                        class="badge bg-danger rounded-pill fw-normal" style="font-size: 0.6rem;">Caution System</span>
                </h5>
                <p class="small text-muted mb-3">NutriAI uses this info to warn you about dangerous scanned foods.</p>

                <div class="mb-3">
                    <label class="form-label small text-muted">Pre-existing Illnesses / Conditions</label>
                    <div class="dropdown">
                        <button
                            class="btn btn-outline-secondary dropdown-toggle w-100 text-start d-flex justify-content-between align-items-center"
                            type="button" id="illnessesDropdown" data-bs-toggle="dropdown" aria-expanded="false"
                            style="border: 1px solid #ced4da; background-color: #fff; color: #212529;">
                            <span id="selectedIllnessesText" class="text-truncate" style="max-width: 90%;">Select
                                Medical Conditions</span>
                        </button>

                        <div class="dropdown-menu w-100 p-3" aria-labelledby="illnessesDropdown"
                            id="illnessesOptionsContainer" style="max-height: 250px; overflow-y: auto;">
                            <!-- Options populated dynamically -->
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted">Allergies (comma separated)</label>
                    <input type="text" class="form-control" id="allergies" placeholder="e.g. Peanuts, Shellfish">
                </div>

                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold" id="saveProfileBtn">Update Goals</button>
            </form>
        </div>

        <!-- Unified Footer Container -->
        <div id="footerContainer"></div>
    </div>

    <!-- jQuery & Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- App Logic -->
    <script src="../scripts/app.js"></script>
</body>

</html>
